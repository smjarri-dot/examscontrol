    ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
const useState = React.useState;
const useEffect = React.useEffect;
const useRef = React.useRef;
const useCallback = React.useCallback;


// ===== CONSTANTS =====
const STAGES = ["ابتدائي","متوسط","ثانوي"];
const GRADES = {
  ابتدائي:["1/أ","1/ب","2/أ","2/ب","3/أ","3/ب","4/أ","4/ب","5/أ","5/ب","6/أ","6/ب"],
  متوسط:  ["1م/أ","1م/ب","2م/أ","2م/ب","3م/أ","3م/ب"],
  ثانوي:  ["1ث/أ","1ث/ب","2ث/أ","2ث/ب","3ث/أ","3ث/ب"],
};
const SUBJECTS_BY_STAGE = {
  ابتدائي:["القرآن الكريم","اللغة العربية","الرياضيات","العلوم","الاجتماعيات","اللغة الإنجليزية","الحاسب","التربية البدنية"],
  متوسط:  ["القرآن الكريم","اللغة العربية","الرياضيات","العلوم","الاجتماعيات","اللغة الإنجليزية","الحاسب","الفقه"],
  ثانوي:  ["التوحيد","اللغة العربية","الرياضيات","الفيزياء","الكيمياء","الأحياء","اللغة الإنجليزية","الحاسب"],
};
const DAYS = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"];
const INV_POOL = ["أ. خالد العمري","أ. فهد الشمري","أ. نجلاء الحربي","أ. محمد الدوسري","أ. سلمى الزهراني","أ. عمر المالكي","أ. رنا السهلي","أ. لانا العمري","أ. ريم الشمري","أ. عبدالله القحطاني","أ. فيصل المطيري","أ. هند الحربي"];
const Q_STATUSES = ["لم تسلّم","مسلّمة","قيد المراجعة","معتمدة","مطبوعة"];
const QSC = {"لم تسلّم":"#E24B4A","مسلّمة":"#EF9F27","قيد المراجعة":"#378ADD","معتمدة":"#1D9E75","مطبوعة":"#534AB7"};
const QSB = {"لم تسلّم":"#FCEBEB","مسلّمة":"#FEF3E2","قيد المراجعة":"#E6F1FB","معتمدة":"#E4F5EE","مطبوعة":"#EEEDFE"};
const PAPER_STEPS = [
  {id:"sealed",   label:"المظاريف مختومة",   icon:"🔒"},
  {id:"opened",   label:"فتح المظاريف",       icon:"✉️"},
  {id:"received", label:"استلام الطلاب",      icon:"📋"},
  {id:"solving",  label:"الحل والمراقبة",     icon:"✍️"},
  {id:"submitted",label:"تسليم الأوراق",      icon:"📤"},
  {id:"verified", label:"التحقق من الأوراق", icon:"🔍"},
  {id:"corrected",label:"التصحيح",            icon:"✏️"},
  {id:"reviewed", label:"مراجعة التصحيح",    icon:"👁️"},
  {id:"recorded", label:"الرصد في نور",       icon:"💻"},
  {id:"audited",  label:"التدقيق",            icon:"✅"},
  {id:"published",label:"إعلان النتائج",      icon:"📢"},
];
const TARGET_IDX = PAPER_STEPS.findIndex(s=>s.id==="recorded");
const FINAL_IDX  = PAPER_STEPS.length-1;
const MEDALS = ["🥇","🥈","🥉"];
const RATING_OPTIONS = ["ممتاز","جيد جداً","جيد","مقبول","ضعيف"];
const RATING_COLOR   = {"ممتاز":"#1D9E75","جيد جداً":"#378ADD","جيد":"#534AB7","مقبول":"#EF9F27","ضعيف":"#E24B4A"};
const stC = {ابتدائي:"#1D9E75",متوسط:"#378ADD",ثانوي:"#534AB7"};
const stB = {ابتدائي:"#E4F5EE",متوسط:"#E6F1FB",ثانوي:"#EEEDFE"};

const initScheduleTpls = () => ({
  ابتدائي:[
    { id:"tpl-ab-1", name:"جدول الصفوف 1-4", appliedTo:["1/أ","1/ب","2/أ","2/ب","3/أ","3/ب","4/أ","4/ب"],
      exams:[
        {id:"e1",subject:"اللغة العربية",   date:"1446/12/15",day:"الأحد",   time:"8:00 ص",duration:120,room:""},
        {id:"e2",subject:"الرياضيات",       date:"1446/12/17",day:"الثلاثاء",time:"8:00 ص",duration:120,room:""},
        {id:"e3",subject:"العلوم",          date:"1446/12/19",day:"الخميس",  time:"8:00 ص",duration:90, room:""},
        {id:"e4",subject:"الاجتماعيات",    date:"1446/12/22",day:"الأحد",   time:"8:00 ص",duration:90, room:""},
        {id:"e5",subject:"اللغة الإنجليزية",date:"1446/12/24",day:"الثلاثاء",time:"8:00 ص",duration:90, room:""},
      ]},
    { id:"tpl-ab-2", name:"جدول الصفوف 5-6", appliedTo:["5/أ","5/ب","6/أ","6/ب"],
      exams:[
        {id:"e1",subject:"اللغة العربية",   date:"1446/12/15",day:"الأحد",   time:"8:00 ص",duration:120,room:""},
        {id:"e2",subject:"الرياضيات",       date:"1446/12/17",day:"الثلاثاء",time:"8:00 ص",duration:120,room:""},
        {id:"e3",subject:"العلوم",          date:"1446/12/19",day:"الخميس",  time:"8:00 ص",duration:90, room:""},
        {id:"e4",subject:"الاجتماعيات",    date:"1446/12/22",day:"الأحد",   time:"8:00 ص",duration:90, room:""},
        {id:"e5",subject:"اللغة الإنجليزية",date:"1446/12/24",day:"الثلاثاء",time:"8:00 ص",duration:90, room:""},
        {id:"e6",subject:"القرآن الكريم",  date:"1446/12/26",day:"الخميس",  time:"8:00 ص",duration:60, room:""},
      ]},
  ],
  متوسط:[
    { id:"tpl-mid-1", name:"جدول المرحلة المتوسطة", appliedTo:["1م/أ","1م/ب","2م/أ","2م/ب","3م/أ","3م/ب"],
      exams:[
        {id:"e1",subject:"اللغة العربية",   date:"1446/12/15",day:"الأحد",   time:"8:00 ص",duration:120,room:""},
        {id:"e2",subject:"الرياضيات",       date:"1446/12/17",day:"الثلاثاء",time:"8:00 ص",duration:120,room:""},
        {id:"e3",subject:"العلوم",          date:"1446/12/19",day:"الخميس",  time:"8:00 ص",duration:90, room:""},
        {id:"e4",subject:"اللغة الإنجليزية",date:"1446/12/22",day:"الأحد",   time:"8:00 ص",duration:90, room:""},
        {id:"e5",subject:"الفقه",           date:"1446/12/24",day:"الثلاثاء",time:"8:00 ص",duration:60, room:""},
      ]},
  ],
  ثانوي:[
    { id:"tpl-sec-1", name:"جدول المرحلة الثانوية", appliedTo:["1ث/أ","1ث/ب","2ث/أ","2ث/ب","3ث/أ","3ث/ب"],
      exams:[
        {id:"e1",subject:"اللغة العربية",   date:"1446/12/15",day:"الأحد",   time:"8:00 ص",duration:120,room:""},
        {id:"e2",subject:"الرياضيات",       date:"1446/12/17",day:"الثلاثاء",time:"8:00 ص",duration:120,room:""},
        {id:"e3",subject:"الفيزياء",        date:"1446/12/19",day:"الخميس",  time:"8:00 ص",duration:90, room:""},
        {id:"e4",subject:"الكيمياء",        date:"1446/12/22",day:"الأحد",   time:"8:00 ص",duration:90, room:""},
        {id:"e5",subject:"اللغة الإنجليزية",date:"1446/12/24",day:"الثلاثاء",time:"8:00 ص",duration:90, room:""},
      ]},
  ],
});

const initSubjects = () => { const r={}; STAGES.forEach(st=>{r[st]=SUBJECTS_BY_STAGE[st].map((name,i)=>({id:i+1,name,teacher:INV_POOL[i%INV_POOL.length],supervisor:INV_POOL[(i+3)%INV_POOL.length],curriculumDone:[100,95,88,100,72,100,60,85][i%8],questionStatus:["معتمدة","قيد المراجعة","مسلّمة","معتمدة","لم تسلّم","مطبوعة","لم تسلّم","معتمدة"][i%8],submitted:[true,true,true,true,false,true,false,true][i%8]}));}); return r; };
const initStudents = () => { const names=["محمد القحطاني","أحمد الزهراني","سلمى العتيبي","عبدالله الدوسري","نورة السهلي","فيصل المطيري","ريم الخالدي","لانا العمري"]; const r={}; STAGES.forEach(st=>{r[st]={};GRADES[st].forEach(g=>{r[st][g]=names.slice(0,6).map((name,i)=>({id:i+1,name,num:`${2024+i}`,grade:g,attendance:{},paperReceived:{},paperSubmitted:{},paperSolved:{}}));});}); return r; };
const initCommittees = () => { const r={}; STAGES.forEach(st=>{r[st]={};GRADES[st].forEach(g=>{r[st][g]=[{room:"",inv1:INV_POOL[0],inv2:INV_POOL[1],inv1Present:null,inv2Present:null,inv1Note:"",inv2Note:"",inv1Time:"",inv2Time:""}];});}); return r; };

const TABS = [
  {id:"dashboard",   icon:"⊞", label:"الداش بورد"},
  {id:"schedules",   icon:"📅", label:"جداول الاختبارات"},
  {id:"curriculum",  icon:"📚", label:"اكتمال المنهج"},
  {id:"questions",   icon:"📝", label:"الأسئلة والاعتماد"},
  {id:"committees",  icon:"👥", label:"لجان الاختبار"},
  {id:"invigilators",icon:"🕐", label:"مراقبة المراقبين"},
  {id:"attendance",  icon:"✔️", label:"حضور وأوراق الطلاب"},
  {id:"daily_report",icon:"📊", label:"التقرير اليومي"},
  {id:"lifecycle",   icon:"🔄", label:"خط السير"},
  {id:"ranking",     icon:"🏆", label:"التنافسي"},
  {id:"publish",     icon:"📢", label:"النشر"},
];

const getGradeExams = (tpls, stage, grade) => {
  const tpl = (tpls[stage]||[]).find(t=>t.appliedTo.includes(grade));
  return tpl ? tpl.exams : [];
};
const getGradeTpl = (tpls, stage, grade) => (tpls[stage]||[]).find(t=>t.appliedTo.includes(grade));

function App() {
  const [tab,setTab]         = useState("schedules");
  const [stage,setStage]     = useState("ابتدائي");
  const [selGrade,setSelGrade] = useState(GRADES["ابتدائي"][0]);
  const [tpls,setTpls]       = useState(initScheduleTpls());
  const [subjects,setSubjects] = useState(initSubjects());
  const [students,setStudents] = useState(initStudents());
  const [committees,setCommittees] = useState(initCommittees());
  const [examLife,setExamLife]   = useState({});
  const [stepTimes,setStepTimes] = useState({});
  const [published,setPublished] = useState({});
  const [selExam,setSelExam]     = useState(null);
  const [attExamKey,setAttExamKey] = useState(null);
  const [editSubj,setEditSubj]   = useState(null);
  const [dailyReport,setDailyReport] = useState({date:"1446/12/15",supervisor:"أ. أحمد الغامدي",generalRating:"جيد جداً",notes:"",rooms:[]});
  const [reportSaved,setReportSaved] = useState(false);
  const [editTpl,setEditTpl]   = useState(null);
  const [showNewTpl,setShowNewTpl] = useState(false);
  const [newTplName,setNewTplName] = useState("");
  const [newTplStage,setNewTplStage] = useState("ابتدائي");
  const [newExamRow,setNewExamRow] = useState({subject:"",date:"",day:"الأحد",time:"8:00 ص",duration:90,room:""});

  const cd  = {background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:16};
  const inp = {padding:"7px 10px",border:"0.5px solid #d1d5db",borderRadius:8,fontSize:12,width:"100%",fontFamily:"Tajawal,sans-serif"};
  const btn = (bg="#f3f4f6",col="#374151",br="#d1d5db")=>({padding:"7px 14px",border:`0.5px solid ${br}`,borderRadius:8,background:bg,color:col,fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif"});
  const bdg = (col,bg)=>({display:"inline-flex",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:500,color:col,background:bg});

  const curStudents = students[stage]?.[selGrade]||[];
  const curSubjects = subjects[stage]||[];
  const curComm     = committees[stage]?.[selGrade]||[];
  const curExams    = getGradeExams(tpls,stage,selGrade);
  const curTpl      = getGradeTpl(tpls,stage,selGrade);

  const getLifeIdx = key=>{const i=PAPER_STEPS.findIndex(s=>s.id===(examLife[key]||"sealed"));return i<0?0:i;};
  const advanceLife = key=>{
    const idx=getLifeIdx(key);
    if(idx<FINAL_IDX){
      const next=PAPER_STEPS[idx+1];
      setExamLife(p=>({...p,[key]:next.id}));
      setStepTimes(p=>({...p,[key]:{...(p[key]||{}),[next.id]:new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"})}}));
    }
  };
  const updateSubjectField=(st,id,f,v)=>setSubjects(p=>({...p,[st]:p[st].map(s=>s.id===id?{...s,[f]:v}:s)}));
  const toggleField=(sid,sub,field)=>{
    setStudents(p=>{
      const ns={...p};ns[stage]={...ns[stage]};
      ns[stage][selGrade]=ns[stage][selGrade].map(st=>{
        if(st.id!==sid)return st;
        if(field==="attendance"){const cy={حاضر:"غائب",غائب:"متأخر",متأخر:"حاضر"};const cur=st.attendance[sub]||"حاضر";return{...st,attendance:{...st.attendance,[sub]:cy[cur]||"حاضر"}};}
        if(field==="paperReceived"){const cur=st.paperReceived[sub]||"لم يستلم";return{...st,paperReceived:{...st.paperReceived,[sub]:cur==="استلم"?"لم يستلم":"استلم"}};}
        if(field==="paperSubmitted")return{...st,paperSubmitted:{...st.paperSubmitted,[sub]:!st.paperSubmitted[sub]}};
        if(field==="paperSolved")return{...st,paperSolved:{...st.paperSolved,[sub]:!st.paperSolved[sub]}};
        return st;
      });return ns;
    });
  };
  const updateInv=(gi,field,val)=>{setCommittees(p=>{const ns={...p};ns[stage]={...ns[stage]};const rooms=[...ns[stage][selGrade]];rooms[gi]={...rooms[gi],[field]:val};ns[stage][selGrade]=rooms;return ns;});};
  const attCol=a=>a==="حاضر"?"#1D9E75":a==="غائب"?"#E24B4A":"#EF9F27";
  const attBg =a=>a==="حاضر"?"#E4F5EE":a==="غائب"?"#FCEBEB":"#FEF3E2";

  const saveTpl = (tpl)=>{setTpls(p=>{const ns={...p};ns[tpl.stage]=ns[tpl.stage].map(t=>t.id===tpl.id?tpl:t);return ns;});setEditTpl(null);};
  const deleteTpl=(st,id)=>setTpls(p=>({...p,[st]:p[st].filter(t=>t.id!==id)}));
  const cloneTpl=(st,tpl)=>{const clone={...tpl,id:"tpl-"+Date.now(),name:tpl.name+" (نسخة)",appliedTo:[],exams:tpl.exams.map(e=>({...e,id:"e"+Math.random()}))};setTpls(p=>({...p,[st]:[...p[st],clone]}));};
  const createTpl=()=>{if(!newTplName)return;const t={id:"tpl-"+Date.now(),name:newTplName,appliedTo:[],exams:[]};setTpls(p=>({...p,[newTplStage]:[...p[newTplStage],t]}));setShowNewTpl(false);setNewTplName("");setEditTpl({...t,stage:newTplStage});};
  const addExamToTpl=(tpl)=>{if(!newExamRow.subject||!newExamRow.date)return;const ex={...newExamRow,id:"e"+Date.now()};const updated={...tpl,exams:[...tpl.exams,ex]};setEditTpl(updated);setNewExamRow({subject:"",date:"",day:"الأحد",time:"8:00 ص",duration:90,room:""});};
  const removeExamFromTpl=(tpl,eid)=>setEditTpl({...tpl,exams:tpl.exams.filter(e=>e.id!==eid)});
  const toggleGradeInTpl=(tpl,g)=>{const has=tpl.appliedTo.includes(g);setEditTpl({...tpl,appliedTo:has?tpl.appliedTo.filter(x=>x!==g):[...tpl.appliedTo,g]});};

  const allStageStats=STAGES.map(st=>({st,done:(subjects[st]||[]).filter(s=>s.curriculumDone===100).length,total:(subjects[st]||[]).length,approved:(subjects[st]||[]).filter(s=>["معتمدة","مطبوعة"].includes(s.questionStatus)).length}));

  const StageGradeBar=()=>(
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:"0.5px solid #e5e7eb"}}>
        {STAGES.map(s=><button key={s} onClick={()=>{setStage(s);setSelGrade(GRADES[s][0]);}} style={{padding:"6px 14px",border:"none",background:stage===s?stC[s]:"#fff",color:stage===s?"#fff":"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontWeight:stage===s?600:400}}>{s}</button>)}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {GRADES[stage].map(g=>{
          const hasTpl=!!(tpls[stage]||[]).find(t=>t.appliedTo.includes(g));
          return <button key={g} onClick={()=>setSelGrade(g)} style={{...btn(selGrade===g?stC[stage]:"#fff",selGrade===g?"#fff":"#374151",selGrade===g?stC[stage]:hasTpl?"#1D9E75":"#d1d5db"),fontSize:11,padding:"4px 10px",position:"relative"}}>
            {g}{hasTpl&&<span style={{position:"absolute",top:-3,left:-3,width:8,height:8,borderRadius:"50%",background:"#1D9E75",border:"1px solid #fff"}}/>}
          </button>;
        })}
      </div>
      <div style={{fontSize:10,color:"#9ca3af"}}>● = يوجد جدول</div>
    </div>
  );

  return (
    <div style={{fontFamily:"Tajawal,sans-serif",direction:"rtl",minHeight:"100vh",background:"#f3f4f6"}}>
      <div style={{background:"#1a2940",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>نظام الاختبارات النهائية المتكامل</div>
          <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>الفصل الدراسي الثالث 1446هـ</div>
        </div>
        <button style={btn("#1D9E75","#fff","#1D9E75")}>🖨️ طباعة</button>
      </div>
      <div style={{background:"#fff",borderBottom:"0.5px solid #e5e7eb",display:"flex",overflowX:"auto"}}>
        {TABS.map(t=><div key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 14px",fontSize:11,cursor:"pointer",borderBottom:tab===t.id?"3px solid #378ADD":"3px solid transparent",color:tab===t.id?"#378ADD":"#6b7280",fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}><span>{t.icon}</span>{t.label}</div>)}
      </div>

      <div style={{padding:"16px 20px"}}>

        {tab==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontSize:15,fontWeight:700}}>لوحة المتابعة العامة</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              {allStageStats.map(({st,done,total,approved})=>(
                <div key={st} style={{...cd,borderTop:`3px solid ${stC[st]}`}}>
                  <div style={{fontSize:13,fontWeight:700,color:stC[st],marginBottom:10}}>المرحلة {st}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <div style={{padding:"8px",background:stB[st],borderRadius:8}}><div style={{fontSize:10,color:"#6b7280"}}>اكتمال المنهج</div><div style={{fontSize:18,fontWeight:700,color:stC[st]}}>{done}/{total}</div></div>
                    <div style={{padding:"8px",background:"#FAEEDA",borderRadius:8}}><div style={{fontSize:10,color:"#6b7280"}}>أسئلة معتمدة</div><div style={{fontSize:18,fontWeight:700,color:"#b45309"}}>{approved}/{total}</div></div>
                    <div style={{padding:"8px",background:"#EEEDFE",borderRadius:8,gridColumn:"1/-1"}}><div style={{fontSize:10,color:"#6b7280"}}>جداول مُبنية</div><div style={{fontSize:18,fontWeight:700,color:"#534AB7"}}>{(tpls[st]||[]).length} جدول — {(tpls[st]||[]).reduce((a,t)=>a+t.appliedTo.length,0)} فصل مُربط</div></div>
                  </div>
                </div>
              ))}
            </div>
            <div style={cd}>

                      <td style={{padding:"5px 6px"}}><input style={{...inp,fontSize:11}} value={ex.date} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],date:e.target.value};setEditTpl({...editTpl,exams:exs});}} placeholder="1446/12/15"/></td>
                      <td style={{padding:"5px 6px"}}><select style={{...inp,fontSize:11}} value={ex.day} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],day:e.target.value};setEditTpl({...editTpl,exams:exs});}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></td>
                      <td style={{padding:"5px 6px"}}><input style={{...inp,fontSize:11}} value={ex.time} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],time:e.target.value};setEditTpl({...editTpl,exams:exs});}} placeholder="8:00 ص"/></td>
                      <td style={{padding:"5px 6px"}}><input type="number" style={{...inp,fontSize:11,width:70}} value={ex.duration} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],duration:+e.target.value};setEditTpl({...editTpl,exams:exs});}}/></td>
                      <td style={{padding:"5px 6px"}}><button onClick={()=>removeExamFromTpl(editTpl,ex.id)} style={{...btn("#FCEBEB","#E24B4A","#E24B4A"),fontSize:11,padding:"3px 8px"}}>حذف</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:"10px",background:"#f9fafb",borderRadius:8,border:"0.5px dashed #d1d5db"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#374151",marginBottom:8}}>إضافة مادة جديدة</div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 1fr 0.8fr",gap:8}}>
                  <select style={{...inp,fontSize:11}} value={newExamRow.subject} onChange={e=>setNewExamRow({...newExamRow,subject:e.target.value})}><option value="">— اختر المادة —</option>{SUBJECTS_BY_STAGE[editTpl.stage].map(s=><option key={s}>{s}</option>)}</select>
                  <input style={{...inp,fontSize:11}} value={newExamRow.date} onChange={e=>setNewExamRow({...newExamRow,date:e.target.value})} placeholder="1446/12/15"/>
                  <select style={{...inp,fontSize:11}} value={newExamRow.day} onChange={e=>setNewExamRow({...newExamRow,day:e.target.value})}>{DAYS.map(d=><option key={d}>{d}</option>)}</select>
                  <input style={{...inp,fontSize:11}} value={newExamRow.time} onChange={e=>setNewExamRow({...newExamRow,time:e.target.value})} placeholder="8:00 ص"/>
                  <input type="number" style={{...inp,fontSize:11}} value={newExamRow.duration} onChange={e=>setNewExamRow({...newExamRow,duration:+e.target.value})} placeholder="90"/>
                </div>
                <button onClick={()=>addExamToTpl(editTpl)} style={{...btn("#1D4ED8","#fff","#1D4ED8"),marginTop:8,fontSize:11}}>+ إضافة</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,paddingTop:12,borderTop:"0.5px solid #e5e7eb"}}>
              <button onClick={()=>saveTpl(editTpl)} style={btn("#1D9E75","#fff","#1D9E75")}>💾 حفظ الجدول</button>
              <button onClick={()=>setEditTpl(null)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {showNewTpl&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{...cd,width:380,maxWidth:"92vw"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>إنشاء جدول جديد</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>اسم الجدول</div><input style={inp} value={newTplName} onChange={e=>setNewTplName(e.target.value)} placeholder="مثال: جدول الصفوف 1-4 الابتدائي"/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المرحلة الدراسية</div>
                <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:"0.5px solid #e5e7eb"}}>
                  {STAGES.map(s=><button key={s} onClick={()=>setNewTplStage(s)} style={{flex:1,padding:"8px",border:"none",background:newTplStage===s?stC[s]:"#fff",color:newTplStage===s?"#fff":"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontWeight:newTplStage===s?600:400}}>{s}</button>)}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={createTpl} style={btn("#1D4ED8","#fff","#1D4ED8")}>إنشاء وتعديل ←</button>
              <button onClick={()=>setShowNewTpl(false)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {editSubj&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{...cd,width:400,maxWidth:"92vw"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>تعديل — {editSubj.name}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المعلم</div><input style={inp} value={editSubj.teacher} onChange={e=>setEditSubj({...editSubj,teacher:e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المشرف</div><input style={inp} value={editSubj.supervisor} onChange={e=>setEditSubj({...editSubj,supervisor:e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>نسبة اكتمال المنهج</div><input type="number" min={0} max={100} style={inp} value={editSubj.curriculumDone} onChange={e=>setEditSubj({...editSubj,curriculumDone:+e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>حالة الأسئلة</div><select style={inp} value={editSubj.questionStatus} onChange={e=>setEditSubj({...editSubj,questionStatus:e.target.value})}>{Q_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>{["teacher","supervisor","curriculumDone","questionStatus"].forEach(f=>updateSubjectField(editSubj._stage,editSubj.id,f,editSubj[f]));setEditSubj(null);}} style={btn("#1D4ED8","#fff","#1D4ED8")}>حفظ</button>
              <button onClick={()=>setEditSubj(null)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App, null));

  </script>
</body>
</html>
