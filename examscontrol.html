function canAccessTab(account, tabId) {
  if (!account) return false;
  if (account.tabs === "all") return true;
  return (account.tabs||[]).includes(tabId);
}

// LOGIN SCREEN
// ═══════════════════════════════════════════
function LoginScreen({ onLogin, initAccounts }) {
  const accounts = initAccounts || loadAccounts();
  const [selRole,    setSelRole]    = React.useState("");
  const [selPerson,  setSelPerson]  = React.useState("");
  const [password,   setPassword]   = React.useState("");
  const [error,      setError]      = React.useState("");
  const [loading,    setLoading]    = React.useState(false);
  const [showPass,   setShowPass]   = React.useState(false);

  const role = ROLES.find(r => r.id === selRole);
  const peopleForRole = accounts.filter(a => a.role === selRole);
  const needsPerson   = role?.multi && peopleForRole.length > 1;
  const readyToLogin  = selRole && (!needsPerson || selPerson) && password;

  const handleRoleChange = (rid) => {
    setSelRole(rid);
    setSelPerson("");
    setPassword("");
    setError("");
    // if only one person for this role, auto-select
    const people = accounts.filter(a => a.role === rid);
    if (people.length === 1) setSelPerson(people[0].id);
  };

  const handleLogin = () => {
    if (!readyToLogin) return;
    setLoading(true);
    setTimeout(() => {
      const targetId = needsPerson ? selPerson : (peopleForRole[0]?.id);
      const acc = accounts.find(a => a.id === targetId && a.password === password);
      if (acc) {
        onLogin(acc);
      } else {
        setError("كلمة المرور غير صحيحة");
        setLoading(false);
      }
    }, 500);
  };

  const inp = { width:"100%", padding:"11px 14px", border:"1px solid #d1d5db", borderRadius:10, fontSize:13, fontFamily:"Tajawal,sans-serif", outline:"none", boxSizing:"border-box", background:"#fff" };

  return (
    <div style={{minHeight:"100vh", background:"#1a2940", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Tajawal,sans-serif", direction:"rtl"}}>
      <div style={{background:"#fff", borderRadius:16, padding:"40px 36px", width:420, maxWidth:"92vw", boxShadow:"0 24px 64px rgba(0,0,0,.35)"}}>
        {(()=>{ const sch=loadSchool(); return (
          <div style={{textAlign:"center", marginBottom:28}}>
            {sch.logo
              ? <img src={sch.logo} alt="شعار المدرسة" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",marginBottom:10,border:"3px solid #e5e7eb"}}/>
              : <div style={{fontSize:42, marginBottom:10}}>🏫</div>
            }
            <div style={{fontSize:17, fontWeight:700, color:"#1a2940"}}>{sch.name||"نظام الاختبارات النهائية"}</div>
            <div style={{fontSize:11, color:"#9ca3af", marginTop:3}}>{sch.sub||"الفصل الدراسي الأول 1446هـ"}</div>
          </div>
        );})()}

        <div style={{display:"flex", flexDirection:"column", gap:14}}>

          {/* Role selector */}
          <div>
            <div style={{fontSize:12, fontWeight:600, color:"#374151", marginBottom:6}}>الصفة</div>
            <select value={selRole} onChange={e => handleRoleChange(e.target.value)}
              style={{...inp, color: selRole?"#111827":"#9ca3af"}}>
              <option value="">— اختر صفتك —</option>
              {ROLES.map(r => (
                <option key={r.id} value={r.id}>{r.icon} {r.label}</option>
              ))}
            </select>
          </div>

          {/* Person selector (if multiple) */}
          {selRole && needsPerson && (
            <div>
              <div style={{fontSize:12, fontWeight:600, color:"#374151", marginBottom:6}}>الاسم</div>
              <select value={selPerson} onChange={e => { setSelPerson(e.target.value); setPassword(""); setError(""); }}
                style={{...inp, color: selPerson?"#111827":"#9ca3af"}}>
                <option value="">— اختر اسمك —</option>
                {peopleForRole.map(p => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            </div>
          )}

          {/* Show selected person info */}
          {selRole && !needsPerson && peopleForRole[0] && (
            <div style={{padding:"8px 12px", background:"#f9fafb", borderRadius:8, fontSize:12, color:"#374151"}}>
              {role?.icon} {peopleForRole[0].name}
            </div>
          )}
          {selRole && needsPerson && selPerson && (
            <div style={{padding:"8px 12px", background:"#f9fafb", borderRadius:8, fontSize:12, color:"#374151"}}>
              {role?.icon} {peopleForRole.find(p=>p.id===selPerson)?.name}
            </div>
          )}

          {/* Password */}
          {selRole && (!needsPerson || selPerson) && (
            <div>
              <div style={{fontSize:12, fontWeight:600, color:"#374151", marginBottom:6}}>كلمة المرور</div>
              <div style={{position:"relative"}}>
                <input
                  type={showPass?"text":"password"}
                  value={password}
                  onChange={e => { setPassword(e.target.value); setError(""); }}
                  onKeyDown={e => e.key==="Enter" && handleLogin()}
                  placeholder="أدخل كلمة المرور"
                  autoFocus
                  style={{...inp, borderColor: error?"#E24B4A":"#d1d5db", paddingLeft:40}}
                />
                <button onClick={()=>setShowPass(p=>!p)}
                  style={{position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", border:"none", background:"none", cursor:"pointer", color:"#9ca3af", fontSize:16}}>
                  {showPass?"🙈":"👁"}
                </button>
              </div>
            </div>
          )}

          {error && (
            <div style={{padding:"8px 12px", background:"#FCEBEB", borderRadius:8, fontSize:12, color:"#E24B4A"}}>
              ⚠ {error}
            </div>
          )}

          <button onClick={handleLogin} disabled={!readyToLogin || loading}
            style={{width:"100%", padding:"12px", border:"none", borderRadius:10,
              background: readyToLogin && !loading ? "#1a2940" : "#e5e7eb",
              color: readyToLogin && !loading ? "#fff" : "#9ca3af",
              fontSize:14, fontWeight:600, cursor: readyToLogin && !loading ? "pointer":"not-allowed",
              fontFamily:"Tajawal,sans-serif", transition:"all .2s"}}>
            {loading ? "جارٍ التحقق..." : "دخول ←"}
          </button>

        </div>
      </div>
    </div>
  );
}

function SchoolSettings({ school, onSave, onClose }) {
  const [name,   setName]   = React.useState(school.name  || "");
  const [sub,    setSub]    = React.useState(school.sub   || "");
  const [logo,   setLogo]   = React.useState(school.logo  || null);
  const fileRef = React.useRef();

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setLogo(ev.target.result);
    reader.readAsDataURL(file);
  };

  const inp = { padding:"9px 12px", border:"1px solid #d1d5db", borderRadius:8, fontSize:13, width:"100%", fontFamily:"Tajawal,sans-serif", outline:"none", boxSizing:"border-box" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,fontFamily:"Tajawal,sans-serif",direction:"rtl"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"28px 24px",width:420,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:15,fontWeight:700,color:"#1a2940"}}>🏫 إعدادات المدرسة</div>
          <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",fontSize:20,color:"#6b7280"}}>×</button>
        </div>

        {/* Logo picker */}
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{position:"relative",display:"inline-block"}}>
            {logo
              ? <img src={logo} alt="شعار" style={{width:90,height:90,borderRadius:"50%",objectFit:"cover",border:"3px solid #e5e7eb",display:"block"}}/>
              : <div style={{width:90,height:90,borderRadius:"50%",background:"#f3f4f6",border:"3px dashed #d1d5db",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto"}}>🏫</div>
            }
            <button onClick={()=>fileRef.current?.click()}
              style={{position:"absolute",bottom:0,left:0,width:28,height:28,borderRadius:"50%",background:"#1a2940",border:"2px solid #fff",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              +
            </button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
          <div style={{fontSize:11,color:"#9ca3af",marginTop:8}}>اضغط + لاختيار شعار المدرسة</div>
          {logo && (
            <button onClick={()=>setLogo(null)} style={{marginTop:6,fontSize:11,color:"#E24B4A",background:"none",border:"none",cursor:"pointer"}}>
              حذف الشعار
            </button>
          )}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:5}}>اسم المدرسة / النظام</div>
            <input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: مدرسة الملك فهد الابتدائية"/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:5}}>الفصل الدراسي</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["الفصل الدراسي الأول 1446هـ","الفصل الدراسي الثاني 1446هـ"].map(s=>(
                <button key={s} onClick={()=>setSub(s)}
                  style={{flex:1,padding:"7px 6px",borderRadius:8,border:`1px solid ${sub===s?"#1a2940":"#e5e7eb"}`,background:sub===s?"#1a2940":"#fff",color:sub===s?"#fff":"#374151",fontSize:11,cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontWeight:sub===s?600:400}}>
                  {s.replace(" 1446هـ","")}

              ))}
            </div>
            <input style={inp} value={sub} onChange={e=>setSub(e.target.value)} placeholder="أو اكتب نصاً مخصصاً..."/>
          </div>
        </div>

        {/* Preview */}
        <div style={{padding:"12px 16px",background:"#1a2940",borderRadius:10,display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          {logo
            ? <img src={logo} alt="شعار" style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,.2)"}}/>
            : <span style={{fontSize:24}}>🏫</span>
          }
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{name||"اسم المدرسة"}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{sub||"النص الفرعي"}</div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave({name,sub,logo})}

            إلغاء

function AccountsManager({ onClose }) {
  const [accounts, setAccounts] = React.useState(loadAccounts());
  const [editItem, setEditItem]  = React.useState(null);
  const [newAcc,   setNewAcc]    = React.useState({ role:"invigilator", name:"", password:"", assignedStage:"ابتدائي", assignedGrades:[], assignedSubjects:[] });
  const [showNew,  setShowNew]   = React.useState(false);
  const [saved,    setSaved]     = React.useState(false);

  const stgColor = {"ابتدائي":"#1D9E75","متوسط":"#378ADD","ثانوي":"#534AB7"};
  const inp = { padding:"7px 10px", border:"0.5px solid #d1d5db", borderRadius:8, fontSize:12, width:"100%", fontFamily:"Tajawal,sans-serif" };

  const doSave = (list) => {
    saveAccounts(list);
    setAccounts(list);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const deleteAcc = (id) => {
    if (id === "admin") return; // protect admin
    doSave(accounts.filter(a => a.id !== id));
  };

  const addAcc = () => {
    if (!newAcc.name.trim() || !newAcc.password.trim()) return;
    const role = ROLES.find(r => r.id === newAcc.role);
    const acc = {
      ...newAcc,
      id: "acc_" + Date.now(),
      tabs: ROLE_TABS[newAcc.role] || [],
      icon: role?.icon || "👤",
      name: newAcc.name.trim(),
      password: newAcc.password.trim(),
    };
    doSave([...accounts, acc]);
    setNewAcc({ role:"invigilator", name:"", password:"", assignedStage:"ابتدائي", assignedGrades:[], assignedSubjects:[] });
    setShowNew(false);
  };

  const toggleGrade = (g, arr, setter) => {
    setter(p => ({ ...p, assignedGrades: p.assignedGrades.includes(g) ? p.assignedGrades.filter(x=>x!==g) : [...p.assignedGrades, g] }));
  };
  const toggleSubject = (s, setter) => {
    setter(p => ({ ...p, assignedSubjects: p.assignedSubjects.includes(s) ? p.assignedSubjects.filter(x=>x!==s) : [...p.assignedSubjects, s] }));
  };

  const needsGrades   = r => ["comm_supervisor","invigilator"].includes(r);
  const needsSubjects = r => ["subject_supervisor","teacher"].includes(r);

  const AccForm = ({ data, setData, onSave, onCancel, saveLabel }) => (

        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>الاسم</div>

        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>كلمة المرور</div>
          <input style={inp} value={data.password} onChange={e=>setData(p=>({...p,password:e.target.value}))} placeholder="كلمة المرور"/>

            <div style={{fontSize:11,color:"#6b7280",marginBottom:3}}>المرحلة</div>
            <select style={inp} value={data.assignedStage||"ابتدائي"} onChange={e=>setData(p=>({...p,assignedStage:e.target.value,assignedGrades:[]}))}>

      {needsGrades(data.role) && (
        <div>

          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {(ALL_GRADES[data.assignedStage||"ابتدائي"]||[]).map(g=>{
              const sel = (data.assignedGrades||[]).includes(g);
              return <button key={g} onClick={()=>toggleGrade(g,data.assignedGrades,setData)}
                style={{padding:"3px 10px",borderRadius:20,border:`0.5px solid ${sel?stgColor[data.assignedStage||"ابتدائي"]:"#d1d5db"}`,background:sel?stgColor[data.assignedStage||"ابتدائي"]:"#fff",color:sel?"#fff":"#374151",fontSize:11,cursor:"pointer"}}>{g}</button>;
            })}
          </div>
        </div>
      )}
      {needsSubjects(data.role) && (
        <div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:5}}>المواد المُعيّنة</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {(ALL_SUBJECTS[data.assignedStage||"ابتدائي"]||[]).map(s=>{
              const sel=(data.assignedSubjects||[]).includes(s);
              return <button key={s} onClick={()=>toggleSubject(s,setData)}
                style={{padding:"3px 10px",borderRadius:20,border:`0.5px solid ${sel?"#1D9E75":"#d1d5db"}`,background:sel?"#1D9E75":"#fff",color:sel?"#fff":"#374151",fontSize:11,cursor:"pointer"}}>{s}</button>;
            })}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={onSave} style={{padding:"6px 16px",borderRadius:8,border:"none",background:"#1D9E75",color:"#fff",fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>{saveLabel}</button>
        <button onClick={onCancel} style={{padding:"6px 16px",borderRadius:8,border:"0.5px solid #d1d5db",background:"#fff",color:"#374151",fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>إلغاء</button>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,overflowY:"auto",padding:"20px 0"}}>
      <div style={{background:"#fff",borderRadius:12,padding:20,width:680,maxWidth:"96vw",margin:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700,color:"#1a2940"}}>🔐 إدارة الحسابات والصلاحيات</div>
          <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",fontSize:20,color:"#6b7280"}}>×</button>
        </div>

        {saved && <div style={{padding:"8px 12px",background:"#E4F5EE",borderRadius:8,fontSize:12,color:"#1D9E75",marginBottom:12}}>💾 تم الحفظ</div>}

        {/* Accounts list */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {accounts.map(acc => {
            const role = ROLES.find(r=>r.id===acc.role);
            return editItem?.id===acc.id
              ? <AccForm key={acc.id} data={editItem} setData={setEditItem}
                  onSave={()=>{ doSave(accounts.map(a=>a.id===editItem.id?{...editItem,tabs:ROLE_TABS[editItem.role]||[],icon:ROLES.find(r=>r.id===editItem.role)?.icon||"👤"}:a)); setEditItem(null); }}
                  onCancel={()=>setEditItem(null)} saveLabel="حفظ التعديل"/>
              : (
                <div key={acc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#f9fafb",borderRadius:10,border:"0.5px solid #e5e7eb"}}>
                  <span style={{fontSize:18}}>{acc.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>{acc.name}</div>
                    <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>
                      {role?.label}
                      {acc.assignedGrades?.length ? " — " + acc.assignedGrades.join("، ") : ""}
                      {acc.assignedSubjects?.length ? " — " + acc.assignedSubjects.join("، ") : ""}
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#6b7280",fontFamily:"monospace",background:"#f3f4f6",padding:"2px 8px",borderRadius:6}}>{acc.password}</div>
                  {acc.id!=="admin" && <>
                    <button onClick={()=>setEditItem({...acc})} style={{padding:"4px 10px",borderRadius:7,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#1D4ED8",fontSize:11,cursor:"pointer"}}>تعديل</button>
                    <button onClick={()=>deleteAcc(acc.id)} style={{padding:"4px 10px",borderRadius:7,border:"0.5px solid #E24B4A",background:"#FCEBEB",color:"#E24B4A",fontSize:11,cursor:"pointer"}}>حذف</button>
                  </>}
                </div>
              );
          })}
        </div>

        {/* Add new */}
        {showNew
          ? <AccForm data={newAcc} setData={setNewAcc} onSave={addAcc} onCancel={()=>setShowNew(false)} saveLabel="إضافة"/>
          : <button onClick={()=>setShowNew(true)} style={{width:"100%",padding:"10px",border:"1px dashed #d1d5db",borderRadius:10,background:"#fff",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>+ إضافة حساب جديد</button>
        }
      </div>
    </div>
  );
}


// Alias for backward compatibility
const GRADES = ALL_GRADES;
const SUBJECTS_BY_STAGE = ALL_SUBJECTS;


function AppWithFirebase() {
  const [fbReady, setFbReady] = useState(false);
  const [initSchool, setInitSchool] = useState(DEFAULT_SCHOOL);
  const [initAccounts, setInitAccounts] = useState(DEFAULT_ACCOUNTS);

  React.useEffect(() => {
    async function init() {
      const [sch, acc] = await Promise.all([loadSchoolAsync(), loadAccountsAsync()]);
      _schoolCache = sch;
      _accountsCache = acc;
      setInitSchool(sch);
      setInitAccounts(acc);
      setFbReady(true);
    }
    init();
  }, []);

  if (!fbReady) return (
    <div style={{minHeight:"100vh",background:"#1a2940",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal,sans-serif",direction:"rtl"}}>
      <div style={{textAlign:"center",color:"#fff"}}>
        <div style={{fontSize:40,marginBottom:16}}>🏫</div>
        <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>جارٍ تحميل البيانات...</div>
        <div style={{width:48,height:48,border:"4px solid rgba(255,255,255,.2)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto"}}/>

  );

  return <App initSchool={initSchool} initAccounts={initAccounts}/>;
}



function App({ initSchool, initAccounts }) {
  const [account,     setAccount]     = useState(null);
  const [showAccMgr,  setShowAccMgr]  = useState(false);
  const [school,      setSchool]      = useState(initSchool || loadSchool());

  const updateSchool = (s) => { saveSchool(s); setSchool(s); };

  if (!account) return <LoginScreen onLogin={setAccount} initAccounts={initAccounts}/>;

  const allowedTabs = TABS.filter(t => canAccessTab(account, t.id)).map(t => ({
    ...t,
    label: TAB_LABELS_OVERRIDE[t.id] ? TAB_LABELS_OVERRIDE[t.id] : t.label,
  }));

  const [tab,setTab]         = useState(allowedTabs[0]?.id || "dashboard");
  const [selGrade,setSelGrade] = useState((account.assignedGrades && account.assignedGrades[0]) || GRADES["ابتدائي"][0]);
  const [stage,setStage]     = useState(account.assignedStage || "ابتدائي");
  const [tpls,setTpls]       = useState(initScheduleTpls());
  const [subjects,setSubjects] = useState(initSubjects());
  const [students,setStudents] = useState(initStudents());
  const [committees,setCommittees] = useState(initCommittees());
  const [examLife,setExamLife]   = useState({});
  const [stepTimes,setStepTimes] = useState({});
  const [published,setPublished] = useState({});
  const [selExam,setSelExam]     = useState(null);
  const [attExamKey,setAttExamKey] = useState(null);
  const [editSubj,setEditSubj]   = useState(null);
  const [dailyReport,setDailyReport] = useState({date:"1446/12/15",supervisor:"أ. أحمد الغامدي",generalRating:"جيد جداً",notes:"",rooms:[]});
  const [reportSaved,setReportSaved] = useState(false);
  const [editTpl,setEditTpl]   = useState(null);
  const [showNewTpl,setShowNewTpl] = useState(false);
  const [newTplName,setNewTplName] = useState("");
  const [newTplStage,setNewTplStage] = useState("ابتدائي");
  const [newExamRow,setNewExamRow] = useState({subject:"",date:"",day:"الأحد",time:"8:00 ص",duration:90,room:""});

  // ── Firebase real-time sync ──
  React.useEffect(() => {
    if (!_db) return;
    const { collection, onSnapshot } = window._firestoreApi;
    const unsub = onSnapshot(collection(_db, "examData"), (snap) => {
      snap.forEach(docSnap => {
        const d = docSnap.data();
        if (docSnap.id === "tpls")       setTpls(d.value);
        if (docSnap.id === "subjects")   setSubjects(d.value);
        if (docSnap.id === "students")   setStudents(d.value);
        if (docSnap.id === "committees") setCommittees(d.value);
        if (docSnap.id === "examLife")   setExamLife(d.value);
        if (docSnap.id === "stepTimes")  setStepTimes(d.value);
        if (docSnap.id === "published")  setPublished(d.value);
      });
    });
    return () => unsub();
  }, []);

  const saveToFirebase = React.useCallback(async (key, value) => {
    if (!_db) return;
    try {
      const { doc, setDoc } = window._firestoreApi;
      await setDoc(doc(_db, "examData", key), { value });
    } catch(e) { console.error("Firebase save error:", e); }
  }, []);

  const cd  = {background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:16};
  const inp = {padding:"7px 10px",border:"0.5px solid #d1d5db",borderRadius:8,fontSize:12,width:"100%",fontFamily:"Tajawal,sans-serif"};
  const btn = (bg="#f3f4f6",col="#374151",br="#d1d5db")=>({padding:"7px 14px",border:`0.5px solid ${br}`,borderRadius:8,background:bg,color:col,fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif"});
  const bdg = (col,bg)=>({display:"inline-flex",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:500,color:col,background:bg});

  const curStudents = students[stage]?.[selGrade]||[];
  const curSubjects = subjects[stage]||[];
  const curComm     = committees[stage]?.[selGrade]||[];
  const curExams    = getGradeExams(tpls,stage,selGrade);
  const curTpl      = getGradeTpl(tpls,stage,selGrade);

  const getLifeIdx = key=>{const i=PAPER_STEPS.findIndex(s=>s.id===(examLife[key]||"sealed"));return i<0?0:i;};
  const advanceLife = key=>{
    const idx=getLifeIdx(key);
    if(idx<FINAL_IDX){
      const next=PAPER_STEPS[idx+1];
      setExamLife(p=>{const n={...p,[key]:next.id};saveToFirebase("examLife",n);return n;});
      setStepTimes(p=>{const t={...(p[key]||{}),[next.id]:new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"})};const n={...p,[key]:t};saveToFirebase("stepTimes",n);return n;});
    }
  };
  const updateSubjectField=(st,id,f,v)=>setSubjects(p=>{const n={...p,[st]:p[st].map(s=>s.id===id?{...s,[f]:v}:s)};saveToFirebase("subjects",n);return n;});
  const toggleField=(sid,sub,field)=>{
    setStudents(p=>{
      const ns={...p};ns[stage]={...ns[stage]};
      ns[stage][selGrade]=ns[stage][selGrade].map(st=>{
        if(st.id!==sid)return st;
        if(field==="attendance"){const cy={حاضر:"غائب",غائب:"متأخر",متأخر:"حاضر"};const cur=st.attendance[sub]||"حاضر";return{...st,attendance:{...st.attendance,[sub]:cy[cur]||"حاضر"}};}
        if(field==="paperReceived"){const cur=st.paperReceived[sub]||"لم يستلم";return{...st,paperReceived:{...st.paperReceived,[sub]:cur==="استلم"?"لم يستلم":"استلم"}};}
        if(field==="paperSubmitted")return{...st,paperSubmitted:{...st.paperSubmitted,[sub]:!st.paperSubmitted[sub]}};
        if(field==="paperSolved")return{...st,paperSolved:{...st.paperSolved,[sub]:!st.paperSolved[sub]}};
        return st;
      });saveToFirebase("students",ns);return ns;
    });
  };
  const updateInv=(gi,field,val)=>{setCommittees(p=>{const ns={...p};ns[stage]={...ns[stage]};const rooms=[...ns[stage][selGrade]];rooms[gi]={...rooms[gi],[field]:val};ns[stage][selGrade]=rooms;saveToFirebase("committees",ns);return ns;});};
  const attCol=a=>a==="حاضر"?"#1D9E75":a==="غائب"?"#E24B4A":"#EF9F27";
  const attBg =a=>a==="حاضر"?"#E4F5EE":a==="غائب"?"#FCEBEB":"#FEF3E2";

  const deleteTpl=(st,id)=>setTpls(p=>{const n={...p,[st]:p[st].filter(t=>t.id!==id)};saveToFirebase("tpls",n);return n;});
  const cloneTpl=(st,tpl)=>{const clone={...tpl,id:"tpl-"+Date.now(),name:tpl.name+" (نسخة)",appliedTo:[],exams:tpl.exams.map(e=>({...e,id:"e"+Math.random()}))};setTpls(p=>({...p,[st]:[...p[st],clone]}));};
  const createTpl=()=>{if(!newTplName)return;const t={id:"tpl-"+Date.now(),name:newTplName,appliedTo:[],exams:[],_isNew:true};setShowNewTpl(false);setNewTplName("");setEditTpl({...t,stage:newTplStage});};
  const saveTpl=(tpl)=>{
    setTpls(p=>{
      const ns={...p};
      if(tpl._isNew){
        const clean=Object.assign({},tpl);
        delete clean._isNew;
        ns[tpl.stage]=[...(ns[tpl.stage]||[]),clean];
      } else {
        ns[tpl.stage]=ns[tpl.stage].map(t=>t.id===tpl.id?tpl:t);
      }
      saveToFirebase("tpls", ns);
      return ns;
    });
    setEditTpl(null);
  };
  const addExamToTpl=(tpl)=>{if(!newExamRow.subject||!newExamRow.date)return;const ex={...newExamRow,id:"e"+Date.now()};const updated={...tpl,exams:[...tpl.exams,ex]};setEditTpl(updated);setNewExamRow({subject:"",date:"",day:"الأحد",time:"8:00 ص",duration:90,room:""});};
  const removeExamFromTpl=(tpl,eid)=>setEditTpl({...tpl,exams:tpl.exams.filter(e=>e.id!==eid)});
  const toggleGradeInTpl=(tpl,g)=>{const has=tpl.appliedTo.includes(g);setEditTpl({...tpl,appliedTo:has?tpl.appliedTo.filter(x=>x!==g):[...tpl.appliedTo,g]});};

  const allStageStats=STAGES.map(st=>({st,done:(subjects[st]||[]).filter(s=>s.curriculumDone===100).length,total:(subjects[st]||[]).length,approved:(subjects[st]||[]).filter(s=>["معتمدة","مطبوعة"].includes(s.questionStatus)).length}));


  const AttDetail = () => {
    const ex = curExams.find(e=>`${stage}-${selGrade}-${e.subject}`===attExamKey);
    const sub = ex ? ex.subject : null;
    if(!sub) return null;
    const present = curStudents.filter(s=>(s.attendance[sub]||"حاضر")==="حاضر").length;
    const recvd   = curStudents.filter(s=>s.paperReceived[sub]==="استلم").length;
    const submd   = curStudents.filter(s=>s.paperSubmitted[sub]).length;
    const solved  = curStudents.filter(s=>s.paperSolved[sub]).length;
    return (
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {curComm.length>0&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {curComm.map((room,i)=>(
              <div key={i} style={{padding:"8px 14px",background:"#f9fafb",border:"0.5px solid #e5e7eb",borderRadius:8,fontSize:12,display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontWeight:700,color:"#374151"}}>القاعة {room.room||("10"+(i+1))}</span>
                <span style={{color:"#d1d5db"}}>|</span>
                <span style={{color:"#6b7280"}}>{room.inv1||"—"}</span>
                {room.inv2&&<><span style={{color:"#d1d5db"}}>/</span><span style={{color:"#6b7280"}}>{room.inv2}</span></>}
              </div>
            ))}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {[["حاضر",present,"#1D9E75","#E4F5EE"],["استلم",recvd,"#378ADD","#E6F1FB"],["سلّم",submd,"#534AB7","#EEEDFE"],["مكتوبة",solved,"#1a7a5e","#E4F5EE"]].map(([l,v,c,bg])=>(
            <div key={l} style={{padding:"10px",background:bg,borderRadius:10,textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#6b7280"}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={cd}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#f9fafb"}}>
                {["#","الطالب","الحضور","استلم الورقة","سلّم الورقة","الورقة مكتوبة","ملاحظات"].map(h=>(
                  <th key={h} style={{textAlign:"right",padding:"7px 9px",fontWeight:600,fontSize:10,color:"#6b7280",borderBottom:"0.5px solid #e5e7eb"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {curStudents.map((stu,idx)=>{
                const att  = stu.attendance[sub]||"حاضر";
                const recv = stu.paperReceived[sub]||"لم يستلم";
                const subm = stu.paperSubmitted[sub]||false;
                const slvd = stu.paperSolved[sub]||false;
                return (
                  <tr key={stu.id} style={{borderBottom:"0.5px solid #f3f4f6",background:att==="غائب"?"#fff9f9":idx%2===0?"#fff":"#fafafa"}}>
                    <td style={{padding:"8px 9px",color:"#9ca3af"}}>{idx+1}</td>
                    <td style={{padding:"8px 9px",fontWeight:500}}>{stu.name}</td>
                    <td style={{padding:"5px 9px"}}>
                      <button onClick={()=>toggleField(stu.id,sub,"attendance")}
                        style={{...bdg(attCol(att),attBg(att)),border:"none",cursor:"pointer",fontFamily:"Tajawal,sans-serif",padding:"4px 10px"}}>
                        {att}
                      </button>
                    </td>
                    <td style={{padding:"5px 9px"}}>
                      <button onClick={()=>toggleField(stu.id,sub,"paperReceived")}
                        style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontSize:11,fontWeight:500,background:recv==="استلم"?"#E4F5EE":"#f3f4f6",color:recv==="استلم"?"#1D9E75":"#6b7280"}}>
                        {recv==="استلم"?"✅ استلم":"لم يستلم"}
                      </button>
                    </td>
                    <td style={{padding:"5px 9px"}}>
                      <button onClick={()=>toggleField(stu.id,sub,"paperSubmitted")}
                        style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontSize:11,fontWeight:500,background:subm?"#E4F5EE":"#FCEBEB",color:subm?"#1D9E75":"#E24B4A"}}>
                        {subm?"✅ سلّم":"لم يسلّم"}
                      </button>
                    </td>
                    <td style={{padding:"5px 9px"}}>
                      <button onClick={()=>toggleField(stu.id,sub,"paperSolved")}
                        style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontSize:11,fontWeight:500,background:slvd?"#E4F5EE":"#FEF3E2",color:slvd?"#1D9E75":"#EF9F27"}}>
                        {slvd?"✅ مكتوبة":"غير مكتوبة ⚠"}
                      </button>
                    </td>
                    <td style={{padding:"5px 9px",fontSize:10,color:"#9ca3af"}}>
                      {att==="غائب"&&<span style={{color:"#E24B4A"}}>غائب</span>}
                      {!slvd&&att!=="غائب"&&subm&&<span style={{color:"#EF9F27"}}>فارغة!</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const StageGradeBar=()=>(
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>

            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>مواد الاختبار وتواريخها</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:10}}>
                <thead><tr style={{background:"#f9fafb"}}>{["المادة","التاريخ","اليوم","الوقت","المدة (د)","حذف"].map(h=><th key={h} style={{textAlign:"right",padding:"6px 8px",fontWeight:600,fontSize:11,color:"#6b7280",borderBottom:"0.5px solid #e5e7eb"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {editTpl.exams.map((ex,i)=>(
                    <tr key={ex.id} style={{borderBottom:"0.5px solid #f3f4f6"}}>
                      <td style={{padding:"5px 6px"}}><select style={{...inp,fontSize:11}} value={ex.subject} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],subject:e.target.value};setEditTpl({...editTpl,exams:exs});}}>{SUBJECTS_BY_STAGE[editTpl.stage].map(s=><option key={s}>{s}</option>)}</select></td>
                      <td style={{padding:"5px 6px"}}><input style={{...inp,fontSize:11}} value={ex.date} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],date:e.target.value};setEditTpl({...editTpl,exams:exs});}} placeholder="1446/12/15"/></td>
                      <td style={{padding:"5px 6px"}}><select style={{...inp,fontSize:11}} value={ex.day} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],day:e.target.value};setEditTpl({...editTpl,exams:exs});}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></td>
                      <td style={{padding:"5px 6px"}}><input style={{...inp,fontSize:11}} value={ex.time} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],time:e.target.value};setEditTpl({...editTpl,exams:exs});}} placeholder="8:00 ص"/></td>
                      <td style={{padding:"5px 6px"}}><input type="number" style={{...inp,fontSize:11,width:70}} value={ex.duration} onChange={e=>{const exs=[...editTpl.exams];exs[i]={...exs[i],duration:+e.target.value};setEditTpl({...editTpl,exams:exs});}}/></td>
                      <td style={{padding:"5px 6px"}}><button onClick={()=>removeExamFromTpl(editTpl,ex.id)} style={{...btn("#FCEBEB","#E24B4A","#E24B4A"),fontSize:11,padding:"3px 8px"}}>حذف</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:"10px",background:"#f9fafb",borderRadius:8,border:"0.5px dashed #d1d5db"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#374151",marginBottom:8}}>إضافة مادة جديدة</div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 1fr 0.8fr",gap:8}}>
                  <select style={{...inp,fontSize:11}} value={newExamRow.subject} onChange={e=>setNewExamRow({...newExamRow,subject:e.target.value})}><option value="">— اختر المادة —</option>{SUBJECTS_BY_STAGE[editTpl.stage].map(s=><option key={s}>{s}</option>)}</select>
                  <input style={{...inp,fontSize:11}} value={newExamRow.date} onChange={e=>setNewExamRow({...newExamRow,date:e.target.value})} placeholder="1446/12/15"/>
                  <select style={{...inp,fontSize:11}} value={newExamRow.day} onChange={e=>setNewExamRow({...newExamRow,day:e.target.value})}>{DAYS.map(d=><option key={d}>{d}</option>)}</select>
                  <input style={{...inp,fontSize:11}} value={newExamRow.time} onChange={e=>setNewExamRow({...newExamRow,time:e.target.value})} placeholder="8:00 ص"/>
                  <input type="number" style={{...inp,fontSize:11}} value={newExamRow.duration} onChange={e=>setNewExamRow({...newExamRow,duration:+e.target.value})} placeholder="90"/>
                </div>
                <button onClick={()=>addExamToTpl(editTpl)} style={{...btn("#1D4ED8","#fff","#1D4ED8"),marginTop:8,fontSize:11}}>+ إضافة</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,paddingTop:12,borderTop:"0.5px solid #e5e7eb"}}>
              <button onClick={()=>saveTpl(editTpl)} style={btn("#1D9E75","#fff","#1D9E75")}>💾 حفظ الجدول</button>
              <button onClick={()=>setEditTpl(null)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {showNewTpl&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{...cd,width:380,maxWidth:"92vw"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>إنشاء جدول جديد</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>اسم الجدول</div><input style={inp} value={newTplName} onChange={e=>setNewTplName(e.target.value)} placeholder="مثال: جدول الصفوف 1-4 الابتدائي"/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المرحلة الدراسية</div>
                <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:"0.5px solid #e5e7eb"}}>
                  {STAGES.map(s=><button key={s} onClick={()=>setNewTplStage(s)} style={{flex:1,padding:"8px",border:"none",background:newTplStage===s?stC[s]:"#fff",color:newTplStage===s?"#fff":"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"Tajawal,sans-serif",fontWeight:newTplStage===s?600:400}}>{s}</button>)}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={createTpl} style={btn("#1D4ED8","#fff","#1D4ED8")}>إنشاء وتعديل ←</button>
              <button onClick={()=>setShowNewTpl(false)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {showAccMgr==="school"&&<SchoolSettings school={school} onSave={(s)=>{updateSchool(s);setShowAccMgr(false);}} onClose={()=>setShowAccMgr(false)}/>}
      {showAccMgr===true&&<AccountsManager onClose={()=>setShowAccMgr(false)}/>}

      {editSubj&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{...cd,width:400,maxWidth:"92vw"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>تعديل — {editSubj.name}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المعلم</div><input style={inp} value={editSubj.teacher} onChange={e=>setEditSubj({...editSubj,teacher:e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>المشرف</div><input style={inp} value={editSubj.supervisor} onChange={e=>setEditSubj({...editSubj,supervisor:e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>نسبة اكتمال المنهج</div><input type="number" min={0} max={100} style={inp} value={editSubj.curriculumDone} onChange={e=>setEditSubj({...editSubj,curriculumDone:+e.target.value})}/></div>
              <div><div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>حالة الأسئلة</div><select style={inp} value={editSubj.questionStatus} onChange={e=>setEditSubj({...editSubj,questionStatus:e.target.value})}>{Q_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>{["teacher","supervisor","curriculumDone","questionStatus"].forEach(f=>updateSubjectField(editSubj._stage,editSubj.id,f,editSubj[f]));setEditSubj(null);}} style={btn("#1D4ED8","#fff","#1D4ED8")}>حفظ</button>
              <button onClick={()=>setEditSubj(null)} style={btn()}>إلغاء</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    waitForFirebase(() => {
      if (window._firebaseDB) setDB(window._firebaseDB);
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<AppWithFirebase />);
    });
  </script>
</body>
</html>
