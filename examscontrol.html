async function fbGet(col, doc) {
  try {
    const s = await window._db.collection(col).doc(doc).get();
    return s.exists ? s.data() : null;
  } catch (e) {
    return null;
  }
}
async function fbSet(col, doc, data) {
  try {
    await window._db.collection(col).doc(doc).set(data);
  } catch (e) {
    console.error(e);
  }
}
